automation:
  - alias: ESP Panel Dynamic V1 - Office Light Sync
    id: esp_panel_dynamic_v1_office_light_sync
    mode: restart
    triggers:
      - trigger: state
        entity_id: switch.office_main_light
      - trigger: homeassistant
        event: start
    actions:
      - action: input_text.set_value
        target:
          entity_id: input_text.esp_panel_w06_value
        data:
          value: "{{ 'ON' if is_state('switch.office_main_light', 'on') else 'OFF' }}"

  - alias: ESP Panel Dynamic V1 - Widget Tap Handler
    id: esp_panel_dynamic_v1_widget_tap_handler
    mode: queued
    triggers:
      - trigger: event
        event_type: esphome.esp_panel_widget_tap
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.widget == 'w06' }}"
            sequence:
              - action: switch.toggle
                target:
                  entity_id: switch.office_main_light
