globals:
  - id: slot_w
    type: int
    restore_value: no
    initial_value: "74"
  - id: slot_h
    type: int
    restore_value: no
    initial_value: "66"
  - id: slot_gap
    type: int
    restore_value: no
    initial_value: "6"
  - id: last_touch_x
    type: int
    restore_value: no
    initial_value: "0"
  - id: last_touch_y
    type: int
    restore_value: no
    initial_value: "0"
  - id: touch_start_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"
  - id: w01_live_text
    type: std::string
    restore_value: no
    initial_value: '"--:--"'
  - id: w02_live_text
    type: std::string
    restore_value: no
    initial_value: '"--"'
  - id: active_media_target
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: active_media_url
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: active_media_label
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: suppress_click_widget
    type: std::string
    restore_value: no
    initial_value: '""'
  - id: suppress_click_until_ms
    type: uint32_t
    restore_value: no
    initial_value: "0"

script:
  - id: show_notification
    mode: restart
    parameters:
      message: string
    then:
      - lvgl.label.update:
          id: notification_message_label
          text: !lambda "return message;"
      - lvgl.widget.show: notification_overlay
      - delay: 12s
      - lvgl.widget.hide: notification_overlay

  - id: refresh_panel
    mode: restart
    then:
      - lvgl.page.show: main_page
      - script.execute: apply_theme
      - script.execute: layout_all_widgets
      - script.execute: render_all_widgets
      - script.execute: update_clock_widgets
      - script.execute: update_date_widgets
      - lvgl.widget.redraw:

  - id: dispatch_entity_action
    mode: queued
    parameters:
      entity: string
    then:
      - if:
          condition:
            lambda: 'return entity.empty();'
          then:
            - logger.log:
                level: WARN
                tag: panel_action
                format: "Ignoring tap because widget action is empty."
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "light.");'
          then:
            - homeassistant.service:
                service: light.toggle
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "switch.");'
          then:
            - homeassistant.service:
                service: switch.toggle
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "input_boolean.");'
          then:
            - homeassistant.service:
                service: input_boolean.toggle
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "fan.");'
          then:
            - homeassistant.service:
                service: fan.toggle
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "cover.");'
          then:
            - homeassistant.service:
                service: cover.toggle
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "scene.");'
          then:
            - homeassistant.service:
                service: scene.turn_on
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "script.");'
          then:
            - homeassistant.service:
                service: script.turn_on
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "button.");'
          then:
            - homeassistant.service:
                service: button.press
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "automation.");'
          then:
            - homeassistant.service:
                service: automation.trigger
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "input_select.");'
          then:
            - homeassistant.service:
                service: input_select.select_next
                data:
                  entity_id: !lambda "return entity;"
      - if:
          condition:
            lambda: 'return esp_panel_string_starts_with(entity, "media_player.");'
          then:
            - homeassistant.service:
                service: media_player.media_play_pause
                data:
                  entity_id: !lambda "return entity;"

  - id: toggle_media_action
    mode: queued
    parameters:
      action: string
      value: string
    then:
      - if:
          condition:
            lambda: 'return esp_panel_is_media_action(action);'
          then:
            - if:
                condition:
                  lambda: 'return esp_panel_media_state_is_active(value);'
                then:
                  - homeassistant.service:
                      service: media_player.media_stop
                      data:
                        entity_id: !lambda "return esp_panel_media_target(action);"
                else:
                  - homeassistant.service:
                      service: media_player.play_media
                      data:
                        entity_id: !lambda "return esp_panel_media_target(action);"
                        media_content_id: !lambda "return esp_panel_media_url(action);"
                        media_content_type: "music"

  - id: open_media_controls
    mode: restart
    parameters:
      action: string
      label: string
    then:
      - if:
          condition:
            lambda: 'return esp_panel_is_media_action(action);'
          then:
            - lambda: |-
                id(active_media_target) = esp_panel_media_target(action);
                id(active_media_url) = esp_panel_media_url(action);
                id(active_media_label) = label;
            - lvgl.label.update:
                id: media_overlay_title_label
                text: !lambda 'return id(active_media_label).empty() ? std::string("Media Controls") : id(active_media_label);'
            - lvgl.label.update:
                id: media_overlay_target_label
                text: !lambda 'return id(active_media_target);'
            - lvgl.widget.show: media_overlay

  - id: dispatch_widget_click
    mode: queued
    parameters:
      widget_id: string
      widget_type: string
      action: string
      value: string
      label: string
    then:
      - if:
          condition:
            lambda: 'return id(suppress_click_widget) == widget_id && millis() <= id(suppress_click_until_ms);'
          then:
            - lambda: |-
                ESP_LOGW("panel_action", "Ignoring click for %s because it just handled a long press.", widget_id.c_str());
                id(suppress_click_widget).clear();
                id(suppress_click_until_ms) = 0;
          else:
            - lambda: |-
                if (!id(suppress_click_widget).empty() && millis() > id(suppress_click_until_ms)) {
                  id(suppress_click_widget).clear();
                  id(suppress_click_until_ms) = 0;
                }
            - script.execute:
                id: dispatch_widget_action
                widget_id: !lambda "return widget_id;"
                widget_type: !lambda "return widget_type;"
                action: !lambda "return action;"
                value: !lambda "return value;"
                label: !lambda "return label;"
                hold: false

  - id: dispatch_widget_action
    mode: queued
    parameters:
      widget_id: string
      widget_type: string
      action: string
      value: string
      label: string
      hold: bool
    then:
      - logger.log:
          level: WARN
          tag: panel_action
          format: "Widget action widget=%s type=%s hold=%s action=%s value=%s"
          args:
            - "widget_id.c_str()"
            - "widget_type.c_str()"
            - "hold ? \"true\" : \"false\""
            - "action.c_str()"
            - "value.c_str()"
      - homeassistant.event:
          event: esphome.esp_panel_widget_tap
          data:
            widget: !lambda "return widget_id;"
      - if:
          condition:
            lambda: 'return widget_type == "media";'
          then:
            - if:
                condition:
                  lambda: 'return hold && esp_panel_is_media_action(action);'
                then:
                  - script.execute:
                      id: open_media_controls
                      action: !lambda "return action;"
                      label: !lambda "return label;"
                else:
                  - if:
                      condition:
                        lambda: 'return esp_panel_is_media_action(action);'
                      then:
                        - script.execute:
                            id: toggle_media_action
                            action: !lambda "return action;"
                            value: !lambda "return value;"
                      else:
                        - logger.log:
                            level: WARN
                            tag: panel_action
                            format: "Media widget %s has no valid media action payload."
                            args:
                              - "widget_id.c_str()"
          else:
            - script.execute:
                id: dispatch_entity_action
                entity: !lambda "return action;"

  - id: apply_theme
    mode: restart
    then:
      - lvgl.widget.update:
          id: main_page
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D));'
          bg_grad_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D), 18));'
          bg_grad_dir: VER
      - lvgl.widget.update:
          id: screen_background
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D));'
          bg_grad_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D), 24));'
          bg_grad_dir: VER
      - lvgl.widget.update:
          id: screen_glow_primary
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8), 32));'
      - lvgl.widget.update:
          id: screen_glow_secondary
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_overlay_title_color).state, 0xFFD166), 24));'
      - lvgl.widget.update:
          id: screen_inner_frame
          border_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8), 26));'
          outline_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_overlay_title_color).state, 0xFFD166), 34));'
      - lvgl.widget.update:
          id: screen_header_panel
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D), 10));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8));'
      - lvgl.label.update:
          id: screen_header_title
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_overlay_text_color).state, 0xF1F5F9));'
      - lvgl.label.update:
          id: screen_header_subtitle
          text_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8), 24));'
      - lvgl.bar.update:
          id: screen_header_bar
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D), 6));'
      - lvgl.widget.update:
          id: screen_header_chip
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D), 8));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8));'
      - lvgl.label.update:
          id: screen_header_chip_title
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_overlay_title_color).state, 0xFFD166));'
      - lvgl.label.update:
          id: screen_header_chip_value
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_overlay_text_color).state, 0xF1F5F9));'
