substitutions:
  screen_width: "480"
  screen_height: "480"

esphome:
  name: household-panel
  friendly_name: Household Panel
  min_version: 2026.4.0
  includes:
    - esp_panel_widget_helpers.h
  on_boot:
    priority: -200
    then:
      - delay: 2s
      - light.turn_on:
          id: display_backlight
          brightness: 85%
      - script.execute: refresh_panel

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: WARN

api:
  actions:
    - action: panel_notify
      variables:
        message: string
      then:
        - script.execute:
            id: show_notification
            message: !lambda "return message;"
  on_client_connected:
    then:
      - delay: 1s
      - script.execute: refresh_panel

ota:
  - platform: esphome

wifi:
  ssid: !sesubstitutions:
  screen_width: "480"
  screen_height: "480"

esphome:
  name: household-panel
