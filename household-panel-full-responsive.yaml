substitutions:
  screen_width: "480"
  screen_height: "480"

esphome:
  name: household-panel
  friendly_name: Household Panel
  min_version: 2026.4.0
  includes:
    - esp_panel_widget_helpers.h
  on_boot:
    priority: -200
    then:
      - delay: 5s
      - light.turn_off: display_backlight
      - delay: 500ms
      - lvgl.page.show: main_page
      - lvgl.widget.redraw:
      - delay: 500ms
      - light.turn_on:
          id: display_backlight
          brightness: 85%
      - delay: 2s
      - lvgl.page.show: main_page
      - lvgl.widget.redraw:
      - script.execute: apply_theme
      - script.execute: layout_all_widgets
      - script.execute: render_all_widgets

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: WARN

api:
  actions:
    - action: panel_notify
      variables:
        message: string
      then:
        - script.execute:
            id: show_notification
            message: !lambda "return message;"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

time:
  - platform: homeassistant
    id: ha_time

output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 100Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

touchscreen:
  platform: gt911
  id: my_touchscreen
  display: my_display
  i2c_id: bus_a
  transform:
    mirror_x: true
    mirror_y: true

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      width: 480
      height: 480

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO1

speaker:
  - platform: i2s_audio
    id: panel_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    i2s_dout_pin: GPIO40
    channel: left
    sample_rate: 44100
    bits_per_sample: 16bit

media_player:
  - platform: speaker
    id: household_panel_speaker
    name: "Household Panel Speaker"
    announcement_pipeline:
      speaker: panel_speaker
      format: WAV

