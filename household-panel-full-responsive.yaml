              snprintf(buffer, sizeof(buffer), "%02d/%02d/%04d", now.day_of_month, now.month, now.year);
              return std::string(buffer);
            }
            return id(w12_value).state;
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(w12_value_color).state, 0xF1F5F9));'
          text_align: LEFT
          text_font: !lambda |-
            auto geometry = esp_panel_widget_geometry((int) id(w12_w).state, (int) id(w12_h).state, id(w12_content_align).state, id(w12_layout_mode).state, id(w12_type).state, (int) id(w12_icon_scale).state, (int) id(w12_label_scale).state, (int) id(w12_value_scale).state);
            int px = geometry.value_px;
            bool bold = id(w12_value_weight).state == "bold";
            if (bold) {
              if (px <= 10) return id(montserrat_bold_10);
              if (px <= 12) return id(montserrat_bold_12);
              if (px <= 14) return id(montserrat_bold_14);
              if (px <= 16) return id(montserrat_bold_16);
              if (px <= 18) return id(montserrat_bold_18);
              if (px <= 22) return id(montserrat_bold_22);
              if (px <= 28) return id(montserrat_bold_28);
              return id(montserrat_bold_36);
            }
            if (px <= 10) return id(montserrat_10);
            if (px <= 12) return id(montserrat_12);
            if (px <= 14) return id(montserrat_14);
            if (px <= 16) return id(montserrat_16);
            if (px <= 18) return id(montserrat_18);
            if (px <= 22) return id(montserrat_22);
            if (px <= 28) return id(montserrat_28);
            return id(montserrat_36);
      - if:
          condition:
            lambda: 'return esp_panel_widget_geometry((int) id(w12_w).state, (int) id(w12_h).state, id(w12_content_align).state, id(w12_layout_mode).state, id(w12_type).state, (int) id(w12_icon_scale).state, (int) id(w12_label_scale).state, (int) id(w12_value_scale).state).text_align_code == 2;'
          then:
            - lvgl.label.update:
                id: w12_value_label
                text_align: RIGHT
          else:
            - if:
                condition:
                  lambda: 'return esp_panel_widget_geometry((int) id(w12_w).state, (int) id(w12_h).state, id(w12_content_align).state, id(w12_layout_mode).state, id(w12_type).state, (int) id(w12_icon_scale).state, (int) id(w12_label_scale).state, (int) id(w12_value_scale).state).text_align_code == 1;'
                then:
                  - lvgl.label.update:
                      id: w12_value_label
                      text_align: CENTER
                else:
                  - lvgl.label.update:
                      id: w12_value_label
                      text_align: LEFT
      - lvgl.label.update:
          id: w12_icon_label
          text: !lambda 'return esp_panel_icon_glyph(id(w12_icon).state, id(w12_type).state);'
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(w12_icon_color).state, 0xF59E0B));'
          text_align: CENTER
          text_font: !lambda |-
            auto geometry = esp_panel_widget_geometry((int) id(w12_w).state, (int) id(w12_h).state, id(w12_content_align).state, id(w12_layout_mode).state, id(w12_type).state, (int) id(w12_icon_scale).state, (int) id(w12_label_scale).state, (int) id(w12_value_scale).state);
            int px = geometry.icon_px;
            if (px <= 24) return id(mdi_icons_24);
            if (px <= 32) return id(mdi_icons_32);
            if (px <= 48) return id(mdi_icons_48);
            return id(mdi_icons_64);

