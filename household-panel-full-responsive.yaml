globals:
  - id: slot_w
    type: int
    restore_value: no
    initial_value: "80"
  - id: slot_h
    type: int
    restore_value: no
    initial_value: "80"
  - id: slot_gap
    type: int
    restore_value: no
    initial_value: "6"

script:
  - id: show_notification
    mode: restart
    parameters:
      message: string
    then:
      - lvgl.label.update:
          id: notification_message_label
          text: !lambda "return message;"
      - lvgl.widget.show: notification_overlay
      - delay: 12s
      - lvgl.widget.hide: notification_overlay

  - id: apply_theme
    mode: restart
    then:
      - lvgl.widget.update:
          id: main_page
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D));'
      - lvgl.widget.update:
          id: screen_background
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_screen_bg_color).state, 0x08142D));'
      - lvgl.widget.update:
          id: w01_card
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_widget_bg_color).state, 0x0D1B33));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(panel_widget_border_color).state, 0x285EA8));'
