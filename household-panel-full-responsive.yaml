  on_boot:
    priority: -200
    then:
      - delay: 2s
      - light.turn_on:
          id: display_backlight
          brightness: 85%
      - script.execute: refresh_panel

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
