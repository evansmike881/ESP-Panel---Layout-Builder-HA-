psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: WARN

api:
  actions:
    - action: panel_notify
      variables:
        message: string
      then:
        - script.execute:
            id: show_notification
            message: !lambda "return message;"
  on_client_connected:
    then:
      - delay: 1s
      - script.execute: refresh_panel

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - delay: 1s
      - script.execute: refresh_panel

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: update_clock_widgets
        - script.execute: update_date_widgets

output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 100Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

touchscreen:
  platform: gt911
  id: my_touchscreen
  display: my_display
  i2c_id: bus_a
  transform:
    mirror_x: true
    mirror_y: true
    swap_xy: false
  on_touch:
    then:
      - lambda: |-
          id(touch_start_ms) = millis();
          id(last_touch_x) = touch.x;
          id(last_touch_y) = touch.y;
          ESP_LOGW("touch_diag", "TOUCH start id=%d state=%d x=%d y=%d raw_x=%d raw_y=%d",
                   touch.id, touch.state, touch.x, touch.y, touch.x_raw, touch.y_raw);
  on_update:
    then:
      - lambda: |-
          for (auto &t : touches) {
            id(last_touch_x) = t.x;
            id(last_touch_y) = t.y;
            ESP_LOGW("touch_diag", "TOUCH move id=%d state=%d x=%d y=%d raw_x=%d raw_y=%d",
                     t.id, t.state, t.x, t.y, t.x_raw, t.y_raw);
          }
  on_release:
    then:
      - logger.log:
          level: WARN
          tag: touch_diag
          format: "TOUCH release"

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      width: 480
      height: 480

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO2
    i2s_bclk_pin: GPIO1

speaker:
  - platform: i2s_audio
    id: panel_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    i2s_dout_pin: GPIO40
    channel: left
    sample_rate: 44100
    bits_per_sample: 16bit

media_player:
  - platform: speaker
    id: household_panel_speaker
    name: "Household Panel Speaker"
    announcement_pipeline:
      speaker: panel_speaker
      format: WAV

