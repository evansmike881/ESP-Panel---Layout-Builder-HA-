lvgl:
  rotation: 180
  pages:
    - id: main_page
      bg_color: 0x08142D
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: screen_background
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x08142D
            border_width: 0
            radius: 0
            scrollable: false
            scrollbar_mode: "OFF"
            pad_all: 0
            widgets:
              - obj:
                  id: screen_glow_primary
                  x: -58
                  y: -52
                  width: 246
                  height: 246
                  radius: 180
                  bg_color: 0x4A88FF
                  bg_opa: 10%
                  border_width: 0
                  clickable: false
                  scrollable: false
              - obj:
                  id: screen_glow_secondary
                  x: 318
                  y: 328
                  width: 188
                  height: 188
                  radius: 160
                  bg_color: 0xFFD166
                  bg_opa: 8%
                  border_width: 0
                  clickable: false
                  scrollable: false
              - obj:
                  id: screen_inner_frame
                  x: 12
                  y: 12
                  width: 456
                  height: 456
                  radius: 30
                  bg_opa: 0%
                  border_width: 1
                  border_color: 0x89A6CF
                  outline_width: 1
                  outline_color: 0xFFFFFF
                  outline_opa: 8%
                  clickable: false
                  scrollable: false
              - obj:
                  id: screen_header_panel
                  x: 18
                  y: 18
                  width: 176
                  height: 46
                  radius: 18
                  bg_color: 0x11213B
                  bg_opa: 42%
                  border_width: 1
                  border_color: 0x285EA8
                  clickable: false
                  scrollable: false
                  widgets:
                    - label:
                        id: screen_header_title
                        x: 14
                        y: 8
                        width: 148
                        height: 18
                        text: "ESP Panel"
                        text_font: montserrat_bold_16
                        text_color: 0xF1F5F9
                    - label:
                        id: screen_header_subtitle
                        x: 14
                        y: 25
                        width: 148
                        height: 14
                        text: "Embedded LVGL"
                        text_font: montserrat_10
                        text_color: 0x8E9FB8
              - bar:
                  id: screen_header_bar
                  x: 206
                  y: 30
                  width: 144
                  height: 8
                  min_value: 0
                  max_value: 100
                  value: 72
                  bg_color: 0x17263E
                  bg_opa: 100%
                  border_width: 0
                  radius: 8
                  pad_all: 2
                  indicator:
                    bg_color: 0xFFD166
                    bg_grad_color: 0x4A88FF
                    bg_grad_dir: HOR
                    radius: 8
              - obj:
                  id: screen_header_chip
                  x: 360
                  y: 18
                  width: 102
                  height: 46
                  radius: 18
                  bg_color: 0x11213B
                  bg_opa: 38%
                  border_width: 1
                  border_color: 0x285EA8
                  clickable: false
                  scrollable: false
                  widgets:
                    - label:
                        id: screen_header_chip_title
                        x: 0
                        y: 8
                        width: 102
                        height: 14
                        text: "UI"
                        text_font: montserrat_bold_12
                        text_align: CENTER
                        text_color: 0xFFD166
                    - label:
                        id: screen_header_chip_value
                        x: 0
                        y: 22
                        width: 102
                        height: 14
                        text: "Live"
                        text_font: montserrat_10
                        text_align: CENTER
                        text_color: 0xDCE7F7
              - line:
                  id: screen_footer_line
                  x: 158
                  y: 452
                  width: 164
                  height: 4
                  line_width: 2
                  line_rounded: true
                  line_color: 0x285EA8
