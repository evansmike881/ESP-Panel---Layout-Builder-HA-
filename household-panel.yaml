globals:
  - id: theme_id
    type: std::string
    restore_value: no
    initial_value: '"graphite"'
  - id: theme_screen_bg
    type: std::string
    restore_value: no
    initial_value: '"#05070B"'
  - id: theme_widget_bg
    type: std::string
    restore_value: no
    initial_value: '"#11161C"'
  - id: theme_border
    type: std::string
    restore_value: no
    initial_value: '"#24303A"'
  - id: theme_button_on
    type: std::string
    restore_value: no
    initial_value: '"#21C58B"'
  - id: theme_button_off
    type: std::string
    restore_value: no
    initial_value: '"#28313A"'
  - id: theme_overlay_bg
    type: std::string
    restore_value: no
    initial_value: '"#0B1015"'
  - id: theme_overlay_title
    type: std::string
    restore_value: no
    initial_value: '"#8FE3C0"'
  - id: theme_overlay_text
    type: std::string
    restore_value: no
    initial_value: '"#F5F7FA"'

script:
  - id: show_notification
    mode: restart
    parameters:
      message: string
    then:
      - lvgl.label.update:
          id: notification_message_label
          text: !lambda "return message;"
      - lvgl.widget.show: notification_overlay
      - delay: 10s
      - lvgl.widget.hide: notification_overlay

  - id: dispatch_entity_action
    mode: queued
    parameters:
      entity: string
    then:
      - if:
          condition:
            lambda: 'return entity.empty();'
          then:
            - logger.log:
                level: WARN
                tag: panel_action
                format: "Ignoring tap because widget action is empty."
          else:
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "light.");'
                then:
                  - homeassistant.service:
                      service: light.toggle
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "switch.");'
                then:
                  - homeassistant.service:
                      service: switch.toggle
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "input_boolean.");'
                then:
                  - homeassistant.service:
                      service: input_boolean.toggle
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "fan.");'
                then:
                  - homeassistant.service:
                      service: fan.toggle
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "cover.");'
                then:
                  - homeassistant.service:
                      service: cover.toggle
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "scene.");'
                then:
                  - homeassistant.service:
                      service: scene.turn_on
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "script.");'
                then:
                  - homeassistant.service:
                      service: script.turn_on
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "button.");'
                then:
                  - homeassistant.service:
                      service: button.press
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "automation.");'
                then:
                  - homeassistant.service:
                      service: automation.trigger
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "input_select.");'
                then:
                  - homeassistant.service:
                      service: input_select.select_next
                      data:
                        entity_id: !lambda "return entity;"
            - if:
                condition:
                  lambda: 'return esp_panel_string_starts_with(entity, "media_player.");'
                then:
                  - homeassistant.service:
                      service: media_player.media_play_pause
                      data:
                        entity_id: !lambda "return entity;"

  - id: apply_theme
    mode: restart
    then:
      - lvgl.widget.update:
          id: main_page
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_screen_bg), 0x08142D));'
          bg_grad_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(theme_screen_bg), 0x08142D), 18));'
          bg_grad_dir: VER
      - lvgl.widget.update:
          id: panel_backdrop
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_screen_bg), 0x08142D));'
          bg_grad_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(theme_screen_bg), 0x08142D), 24));'
          bg_grad_dir: VER
      - lvgl.widget.update:
          id: glow_primary
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_border), 0x285EA8), 24));'
      - lvgl.widget.update:
          id: glow_secondary
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_overlay_title), 0xFFD166), 18));'
      - lvgl.widget.update:
          id: outer_frame
          border_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_border), 0x285EA8), 22));'
          outline_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_overlay_title), 0xFFD166), 34));'
      - lvgl.widget.update:
          id: header_shell
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_screen_bg), 0x08142D), 8));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_border), 0x285EA8));'
      - lvgl.bar.update:
          id: header_meter
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_darken(esp_panel_parse_color(id(theme_screen_bg), 0x08142D), 6));'
      - lvgl.widget.update:
          id: status_chip
          bg_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_screen_bg), 0x08142D), 10));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_border), 0x285EA8));'
      - lvgl.line.update:
          id: footer_divider
          line_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_border), 0x285EA8), 14));'
          points:
            - 0, 2
            - 180, 2
      - lvgl.widget.update:
          id: notification_overlay
          bg_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_bg), 0x06101F));'
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_border), 0x285EA8));'
      - lvgl.label.update:
          id: notification_title_label
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_title), 0xFFD166));'
      - lvgl.label.update:
          id: notification_message_label
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_text), 0xF1F5F9));'

  - id: render_header
    mode: restart
    then:
      - lvgl.label.update:
          id: header_title
          text: "Home Core"
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_text), 0xF1F5F9));'
      - lvgl.label.update:
          id: header_subtitle
          text: "Environment + Controls"
          text_color: !lambda 'return lv_color_hex(esp_panel_color_lighten(esp_panel_parse_color(id(theme_border), 0x285EA8), 22));'
      - lvgl.label.update:
          id: status_chip_title
          text: "Theme"
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_title), 0xFFD166));'
      - lvgl.label.update:
          id: status_chip_value
          text: !lambda 'return id(theme_id);'
          text_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_overlay_text), 0xF1F5F9));'

  - id: render_w01
    mode: restart
    then:
      - lvgl.widget.update:
          id: w01_card
          hidden: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return !config.visible || config.type == "blank";
          bg_color: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            std::string value = id(w01_value_source).state;
            if (esp_panel_runtime_text_unavailable(value)) value = "";
            const uint32_t bg = esp_panel_widget_effective_bg(config.type, value, config.bg_color, esp_panel_parse_color(id(theme_screen_bg), 0x08142D), esp_panel_parse_color(id(theme_widget_bg), 0x0D1B33), esp_panel_parse_color(id(theme_button_on), 0x14B8A6), esp_panel_parse_color(id(theme_button_off), 0x1F2937));
            return lv_color_hex(bg);
          bg_grad_color: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            std::string value = id(w01_value_source).state;
            if (esp_panel_runtime_text_unavailable(value)) value = "";
            const uint32_t bg = esp_panel_widget_effective_bg(config.type, value, config.bg_color, esp_panel_parse_color(id(theme_screen_bg), 0x08142D), esp_panel_parse_color(id(theme_widget_bg), 0x0D1B33), esp_panel_parse_color(id(theme_button_on), 0x14B8A6), esp_panel_parse_color(id(theme_button_off), 0x1F2937));
            return lv_color_hex(esp_panel_color_darken(bg, 16));
          bg_grad_dir: VER
          border_width: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return config.show_border ? 2 : 0;
          border_color: !lambda 'return lv_color_hex(esp_panel_parse_color(id(theme_border), 0x285EA8));'
          border_opa: 72%
      - lvgl.widget.update:
          id: w01_icon_label
          hidden: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return !config.show_icon;
      - lvgl.label.update:
          id: w01_icon_label
          text: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return esp_panel_icon_glyph(config.icon, config.type);
          text_color: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return lv_color_hex(esp_panel_parse_color(config.icon_color, 0xFFD166));
      - lvgl.widget.update:
          id: w01_label_label
          hidden: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return !config.show_label;
      - lvgl.label.update:
          id: w01_label_label
          text: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return esp_panel_transform_label(config.label, config.label_transform);
          text_color: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return lv_color_hex(esp_panel_parse_color(config.label_color, 0xA8C3EA));
      - lvgl.widget.update:
          id: w01_value_label
          hidden: !lambda |-
            std::string raw = id(w01_config_source).state;
            if (esp_panel_runtime_text_unavailable(raw) || raw.empty()) raw = "clock|1|1|1|1|1||Clock|clock|start|none|bold|normal|%23ffd166|%23a8c3ea|%23f1f5f9|100|100|100|0|0|3|1";
            auto config = esp_panel_parse_widget_runtime(raw);
            return !config.show_value;
      - lvgl.label.update:
          id: w01_value_label
