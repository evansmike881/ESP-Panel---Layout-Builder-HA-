lvgl:
  rotation: 180
  pages:
    - id: main_page
      bg_color: 0x08142D
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: panel_backdrop
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x05070B
            bg_grad_color: 0x10161B
            bg_grad_dir: VER
            border_width: 0
            radius: 0
            clickable: false
            scrollable: false
        - obj:
            id: glow_primary
            x: 282
            y: -34
            width: 188
            height: 188
            radius: 180
            bg_color: 0x21C58B
            bg_opa: 8%
            border_width: 0
            clickable: false
            scrollable: false
        - obj:
            id: glow_secondary
            x: -42
            y: 338
            width: 164
            height: 164
            radius: 150
            bg_color: 0xF6B73C
            bg_opa: 6%
            border_width: 0
            clickable: false
            scrollable: false
        - obj:
            id: outer_frame
            x: 10
            y: 10
            width: 460
            height: 460
            bg_opa: 0%
            border_width: 0
            outline_width: 1
            outline_color: 0xFFFFFF
            outline_opa: 4%
            radius: 22
            clickable: false
            scrollable: false
        - obj:
            id: header_shell
            x: 18
            y: 18
            width: 444
            height: 44
            radius: 16
            bg_color: 0x0E1318
            bg_opa: 78%
            border_width: 0
            clickable: false
            scrollable: false
            widgets:
              - label:
                  id: header_title
                  x: 16
                  y: 6
                  width: 156
                  height: 18
                  text: "Home Core"
                  text_font: montserrat_bold_16
                  text_color: 0xF1F5F9
              - label:
                  id: header_subtitle
                  x: 16
                  y: 23
                  width: 180
                  height: 14
                  text: "Environment + Controls"
                  text_font: montserrat_10
                  text_color: 0x8E9FB8
              - bar:
                  id: header_meter
                  x: 176
                  y: 18
                  width: 128
                  height: 8
                  min_value: 0
                  max_value: 100
                  value: 78
                  bg_color: 0x1C242C
                  border_width: 0
                  radius: 10
                  pad_all: 2
                  indicator:
                    bg_color: 0x8FE3C0
                    bg_grad_color: 0x21C58B
                    bg_grad_dir: HOR
                    radius: 10
              - obj:
                  id: status_chip
                  x: 318
                  y: 5
                  width: 112
                  height: 36
                  radius: 14
                  bg_color: 0x171E25
                  bg_opa: 100%
                  border_width: 0
                  clickable: false
                  scrollable: false
                  widgets:
                    - label:
                        id: status_chip_title
                        x: 0
                        y: 6
                        width: 112
                        height: 12
                        text: "Theme"
                        text_font: montserrat_bold_12
                        text_align: CENTER
                        text_color: 0xFFD166
                    - label:
                        id: status_chip_value
                        x: 0
