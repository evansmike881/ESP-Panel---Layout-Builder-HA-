  - platform: homeassistant
    id: panel_theme_source
    entity_id: input_text.esp_panel_runtime_theme
    on_value:
      then:
        - lambda: |-
            id(theme_id) = "graphite";
            id(theme_screen_bg) = "#05070B";
            id(theme_widget_bg) = "#11161C";
            id(theme_border) = "#24303A";
            id(theme_button_on) = "#21C58B";
            id(theme_button_off) = "#28313A";
            id(theme_overlay_bg) = "#0B1015";
            id(theme_overlay_title) = "#8FE3C0";
            id(theme_overlay_text) = "#F5F7FA";
