substitutions:
  screen_width: "480"
  screen_height: "480"

esphome:
  name: household-panel
  friendly_name: Household Panel
  min_version: 2026.4.0
  on_boot:
    priority: -200
    then:
      - delay: 1s
      - light.turn_on:
          id: display_backlight
          brightness: 85%
      - script.execute: apply_live_layout
      - script.execute: sync_clock_widgets

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: WARN

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - delay: 1s
      - script.execute: apply_live_layout
      - script.execute: sync_clock_widgets

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: apply_live_layout
        - script.execute: sync_clock_widgets
    on_time:
      - seconds: /1
        then:
          - script.execute: sync_clock_widgets

output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 100Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

touchscreen:
  platform: gt911
  id: panel_touch
  display: my_display
  i2c_id: bus_a
  transform:
    mirror_x: true
    mirror_y: true
    swap_xy: false

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      width: 480
      height: 480

font:
  - file:
      type: gfonts
      family: Montserrat
      weight: 400
    id: montserrat_18
    size: 18
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_14
    size: 14
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_36
    size: 36
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_52
    size: 52
    bpp: 4

text_sensor:
  - platform: homeassistant
    id: slot_1_payload
    entity_id: input_text.esp_panel_widget_slot_1
    on_value:
      then:
        - script.execute: apply_live_layout
  - platform: homeassistant
    id: slot_2_payload
    entity_id: input_text.esp_panel_widget_slot_2
    on_value:
      then:
        - script.execute: apply_live_layout
  - platform: homeassistant
    id: slot_3_payload
