        - obj:
            id: screen_root
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x08142D
            bg_grad_color: 0x050B16
            bg_grad_dir: VER
            border_width: 0
            pad_all: 0
            radius: 0
            scrollable: false
