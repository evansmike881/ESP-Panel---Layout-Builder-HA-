  - id: sync_clock_widgets
    then:
      - if:
          condition:
            lambda: return id(slot_1_visible) && !id(slot_1_analogue);
          then:
            - lvgl.label.update:
                id: slot_1_time
                text: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return std::string("--:--");
                  char buffer[16];
                  now.strftime(buffer, sizeof(buffer), id(slot_1_show_seconds) ? "%H:%M:%S" : "%H:%M");
                  return std::string(buffer);
            - lvgl.label.update:
                id: slot_1_date
                text: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return std::string("-- ---");
                  char buffer[24];
                  now.strftime(buffer, sizeof(buffer), "%a %d %b");
                  return std::string(buffer);
      - if:
          condition:
            lambda: return id(slot_1_visible) && id(slot_1_analogue);
          then:
            - lvgl.indicator.update:
                id: slot_1_minute_hand
                value: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return 0;
                  return now.minute;
            - lvgl.indicator.update:
                id: slot_1_hour_hand
                value: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return 0;
                  return (now.hour % 12) * 60 + now.minute;
            - lvgl.indicator.update:
                id: slot_1_second_hand
                value: !lambda |-
                  auto now = id(ha_time).now();
                  if (!now.is_valid()) return 0;
                  return now.second;
