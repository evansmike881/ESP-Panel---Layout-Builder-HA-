lvgl:
  rotation: 180
  pages:
    - id: main_page
      bg_color: 0x08142D
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: screen_root
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x08142D
            bg_grad_color: 0x050B16
            bg_grad_dir: VER
            border_width: 0
            pad_all: 0
            radius: 0
            scrollable: false
            widgets:
              - obj:
                  id: slot_1_card
                  x: !lambda return id(slot_1_x) * 80;
                  y: !lambda return id(slot_1_y) * 80;
                  width: !lambda return id(slot_1_w) * 80;
                  height: !lambda return id(slot_1_h) * 80;
                  hidden: !lambda return !id(slot_1_visible);
                  bg_color: 0x12315A
                  bg_grad_color: 0x091A34
                  bg_grad_dir: VER
                  border_color: 0x6ED9FF
                  border_width: 2
                  radius: 22
                  pad_top: 14
                  pad_bottom: 14
                  pad_left: 16
                  pad_right: 16
                  scrollable: false
                  widgets:
                    - label:
                        id: slot_1_title
                        x: 0
                        y: 0
                        width: 100%
                        text: !lambda |-
                          return id(slot_1_title_text);
                        text_font: montserrat_bold_14
                        text_color: 0x9FC7FF
                    - obj:
                        id: slot_1_digital
                        x: 0
                        y: 34
                        width: 100%
                        height: !lambda return id(slot_1_h) * 80 - 48;
                        hidden: !lambda return !id(slot_1_visible) || id(slot_1_analogue);
                        bg_opa: TRANSP
                        border_width: 0
                        scrollable: false
                        layout:
                          type: FLEX
                          flex_flow: COLUMN
                          flex_align_main: CENTER
                          flex_align_cross: START
                          flex_align_track: CENTER
                        widgets:
                          - label:
                              id: slot_1_time
                              text: "--:--"
                              text_font: montserrat_bold_52
                              text_color: 0xF5F9FF
                          - label:
                              id: slot_1_date
                              text: "-- ---"
                              text_font: montserrat_18
                              text_color: 0xC8DAF7
                    - obj:
                        id: slot_1_analog_shell
                        x: 0
                        y: 28
                        width: 100%
                        height: !lambda return id(slot_1_h) * 80 - 42;
                        hidden: !lambda return !id(slot_1_visible) || !id(slot_1_analogue);
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        scrollable: false
                        widgets:
                          - meter:
                              id: slot_1_analog
                              width: 100%
                              height: 100%
                              align: CENTER
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              text_color: 0xDCEBFF
                              scales:
                                - range_from: 0
                                  range_to: 60
                                  angle_range: 360
                                  rotation: 270
                                  ticks:
                                    width: 1
                                    count: 61
                                    length: 10
                                    color: 0xC8DAF7
                                  indicators:
                                    - line:
                                        id: slot_1_minute_hand
                                        width: 4
                                        color: 0x8FDCFF
                                        length: 78%
                                        rounded: true
                                        value: 0
                                    - line:
                                        id: slot_1_second_hand
                                        width: 2
                                        color: 0xFFD36B
                                        length: 86%
                                        rounded: true
                                        value: 0
                                - range_from: 1
                                  range_to: 12
                                  angle_range: 330
                                  rotation: 300
                                  ticks:
                                    width: 1
                                    count: 12
                                    length: 1
                                    color: 0x000000
                                    major:
                                      stride: 1
                                      width: 3
                                      length: 16
                                      color: 0xF5F9FF
                                      label_gap: 0
                                - range_from: 0
                                  range_to: 720
                                  angle_range: 360
                                  rotation: 270
                                  ticks:
                                    count: 2
