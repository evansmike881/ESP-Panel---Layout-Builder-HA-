substitutions:
  screen_width: "480"
  screen_height: "480"

esphome:
  name: household-panel
  friendly_name: Household Panel
  min_version: 2026.4.0
  on_boot:
    priority: -200
    then:
      - delay: 1s
      - light.turn_on:
          id: display_backlight
          brightness: 85%
      - script.execute: sync_clock_widgets

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true

psram:
  mode: octal
  speed: 80MHz

preferences:
  flash_write_interval: 5min

logger:
  level: WARN

api:

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - delay: 1s
      - script.execute: sync_clock_widgets

time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        - script.execute: sync_clock_widgets
    on_time:
      - seconds: /1
        then:
          - script.execute: sync_clock_widgets

output:
  - platform: ledc
    pin: GPIO38
    id: gpio_backlight_pwm
    frequency: 100Hz

light:
  - platform: monochromatic
    output: gpio_backlight_pwm
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

i2c:
  - id: bus_a
    sda: GPIO19
    scl:
      number: GPIO45
      ignore_strapping_warning: true

touchscreen:
  platform: gt911
  id: panel_touch
  display: my_display
  i2c_id: bus_a
  transform:
    mirror_x: true
    mirror_y: true
    swap_xy: false

spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

display:
  - platform: mipi_rgb
    id: my_display
    model: GUITION-4848S040
    auto_clear_enabled: false
    update_interval: never
    dimensions:
      width: 480
      height: 480

font:
  - file:
      type: gfonts
      family: Montserrat
      weight: 400
    id: montserrat_14
    size: 14
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 400
    id: montserrat_18
    size: 18
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_14
    size: 14
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_22
    size: 22
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_36
    size: 36
    bpp: 4
  - file:
      type: gfonts
      family: Montserrat
      weight: 700
    id: montserrat_bold_52
    size: 52
    bpp: 4

script:
  - id: sync_clock_widgets
    then:
      - lvgl.label.update:
          id: clock_1_time
          text: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return std::string("--:--");
            char buffer[16];
            now.strftime(buffer, sizeof(buffer), "%H:%M");
            return std::string(buffer);
      - lvgl.label.update:
          id: clock_1_date
          text: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return std::string("-- ---");
            char buffer[24];
            now.strftime(buffer, sizeof(buffer), "%a %d %b");
            return std::string(buffer);
      - lvgl.indicator.update:
          id: clock_2_minute_hand
          value: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return 0;
            return now.minute;
      - lvgl.indicator.update:
          id: clock_2_hour_hand
          value: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return 0;
            return (now.hour % 12) * 60 + now.minute;
      - lvgl.indicator.update:
          id: clock_2_second_hand
          value: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return 0;
            return now.second;

lvgl:
  rotation: 180
  pages:
    - id: main_page
      bg_color: 0x08142D
      pad_all: 0
      scrollable: false
      scrollbar_mode: "OFF"
      widgets:
        - obj:
            id: screen_root
            x: 0
            y: 0
            width: 480
            height: 480
            bg_color: 0x08142D
            bg_grad_color: 0x050B16
            bg_grad_dir: VER
            border_width: 0
            pad_all: 12
            radius: 0
            scrollable: false
            layout:
              type: GRID
              grid_rows: 6
              grid_columns: 6
              pad_row: 8
              pad_column: 8
              grid_cell_x_align: center
              grid_cell_y_align: center
            widgets:
              - obj:
                  id: clock_1_card
                  grid_cell_column_pos: 0
                  grid_cell_row_pos: 0
                  grid_cell_column_span: 4
                  grid_cell_row_span: 2
                  width: 100%
                  height: 100%
                  bg_color: 0x12315A
                  bg_grad_color: 0x091A34
                  bg_grad_dir: VER
                  border_color: 0x6ED9FF
                  border_width: 2
                  radius: 22
                  pad_top: 14
                  pad_bottom: 14
                  pad_left: 16
                  pad_right: 16
                  scrollable: false
                  layout:
                    type: FLEX
                    flex_flow: COLUMN
                    flex_align_main: CENTER
                    flex_align_cross: START
                    flex_align_track: CENTER
                  widgets:
                    - label:
                        text: "Primary Clock"
                        text_font: montserrat_bold_14
                        text_color: 0x9FC7FF
                    - label:
                        id: clock_1_time
                        text: "--:--"
                        text_font: montserrat_bold_52
                        text_color: 0xF5F9FF
                    - label:
                        id: clock_1_date
                        text: "-- ---"
                        text_font: montserrat_18
                        text_color: 0xC8DAF7
              - obj:
                  id: clock_2_card
                  grid_cell_column_pos: 2
                  grid_cell_row_pos: 2
                  grid_cell_column_span: 3
                  grid_cell_row_span: 3
                  width: 100%
                  height: 100%
                  bg_color: 0x12315A
                  bg_grad_color: 0x091A34
                  bg_grad_dir: VER
                  border_color: 0x6ED9FF
                  border_width: 2
                  radius: 22
                  pad_top: 14
                  pad_bottom: 14
                  pad_left: 14
                  pad_right: 14
                  scrollable: false
                  widgets:
                    - label:
                        x: 0
                        y: 0
                        width: 100%
                        text: "Analogue Clock"
                        text_font: montserrat_bold_14
                        text_color: 0x9FC7FF
                    - meter:
                        id: clock_2_meter
                        x: 0
                        y: 24
                        width: 100%
                        height: 100%
                        align: CENTER
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        text_color: 0xDCEBFF
                        scales:
                          - range_from: 0
                            range_to: 60
                            angle_range: 360
                            rotation: 270
                            ticks:
                              width: 1
                              count: 61
                              length: 10
                              color: 0xC8DAF7
                            indicators:
                              - line:
                                  id: clock_2_minute_hand
                                  width: 4
                                  color: 0x8FDCFF
                                  length: 78%
                                  rounded: true
                                  value: 0
                              - line:
                                  id: clock_2_second_hand
                                  width: 2
                                  color: 0xFFD36B
                                  length: 86%
                                  rounded: true
                                  value: 0
                          - range_from: 1
                            range_to: 12
                            angle_range: 330
                            rotation: 300
                            ticks:
                              width: 1
                              count: 12
                              length: 1
                              color: 0x000000
                              major:
                                stride: 1
                                width: 3
                                length: 16
                                color: 0xF5F9FF
                                label_gap: 0
                          - range_from: 0
                            range_to: 720
                            angle_range: 360
                            rotation: 270
                            ticks:
                              count: 2
                            indicators:
                              - line:
                                  id: clock_2_hour_hand
                                  width: 6
                                  color: 0xF7FBFF
                                  length: 56%
                                  rounded: true
                                  value: 0
