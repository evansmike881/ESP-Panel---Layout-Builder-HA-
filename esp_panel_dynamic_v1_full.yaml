# Example automation
# Create this in automations.yaml or the UI if you want widget taps to trigger actions.
automation:
  - alias: ESP Panel Dynamic V1 - Widget Tap Handler
    id: esp_panel_dynamic_v1_widget_tap_handler
    mode: queued
    triggers:
      - trigger: event
        event_type: esphome.esp_panel_widget_tap
    actions:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event.data.widget == 'w06' }}"
            sequence:
              - action: switch.toggle
                target:
                  entity_id: switch.office_main_light



